<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 700" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b6258"/>
    </marker>
    <marker id="arrowox" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#8a3324"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="840" height="700" fill="#faf6ee"/>

  <!-- Title -->
  <text x="420" y="44" text-anchor="middle" font-size="25" font-style="italic" fill="#2b2622">The Scarcinal Phase Plane</text>
  <text x="420" y="68" text-anchor="middle" font-size="13.5" fill="#6b6258">Inflation against unemployment: a map of where the binding scarcity sits</text>

  <!-- Quadrant fills (plot box: x 110–730, y 100–560; center 420,330) -->
  <rect x="110" y="100" width="310" height="230" fill="#f5ead2"/>           <!-- UL Overheating -->
  <rect x="420" y="100" width="310" height="230" fill="#eaccc2"/>           <!-- UR Stagflation -->
  <rect x="110" y="330" width="310" height="230" fill="#e8efe6"/>           <!-- LL Tranquility -->
  <rect x="420" y="330" width="310" height="230" fill="#e2eaf0"/>           <!-- LR Debt-Deflation -->

  <!-- Shaded brace over the two right quadrants: where the descent occurs -->
  <rect x="420" y="100" width="310" height="230" fill="#8a3324" opacity="0.05"/>
  <rect x="420" y="330" width="310" height="230" fill="#8a3324" opacity="0.05"/>

  <!-- Plot border + axis cross -->
  <rect x="110" y="100" width="620" height="460" fill="none" stroke="#bcb2a4" stroke-width="1"/>
  <line x1="420" y1="100" x2="420" y2="560" stroke="#9c9286" stroke-width="1.4"/>
  <line x1="110" y1="330" x2="730" y2="330" stroke="#9c9286" stroke-width="1.4"/>

  <!-- Quadrant labels -->
  <!-- Overheating UL -->
  <text x="265" y="200" text-anchor="middle" font-size="19" letter-spacing="1.5" fill="#7a5a18">OVERHEATING</text>
  <text x="265" y="224" text-anchor="middle" font-size="12.5" fill="#5c5247">goods layer binds;</text>
  <text x="265" y="241" text-anchor="middle" font-size="12.5" fill="#5c5247">money abundant</text>
  <text x="265" y="266" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a8073">the conventional tradeoff</text>

  <!-- Stagflation UR -->
  <text x="575" y="196" text-anchor="middle" font-size="19" letter-spacing="1.5" fill="#8a3324">STAGFLATION</text>
  <text x="575" y="220" text-anchor="middle" font-size="12.5" fill="#5c5247">the bind, two scarcities,</text>
  <text x="575" y="237" text-anchor="middle" font-size="12.5" fill="#5c5247">one instrument</text>
  <text x="575" y="262" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a8073">the 1970s</text>

  <!-- Tranquility LL -->
  <text x="265" y="430" text-anchor="middle" font-size="19" letter-spacing="1.5" fill="#3f6b3a">TRANQUILITY</text>
  <text x="265" y="454" text-anchor="middle" font-size="12.5" fill="#5c5247">both scarcities slack;</text>
  <text x="265" y="471" text-anchor="middle" font-size="12.5" fill="#5c5247">fragility accrues unseen</text>
  <text x="265" y="496" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a8073">Minsky's deceptive calm</text>

  <!-- Debt-Deflation LR -->
  <text x="575" y="430" text-anchor="middle" font-size="19" letter-spacing="1.5" fill="#2f5670">DEBT-DEFLATION</text>
  <text x="575" y="454" text-anchor="middle" font-size="12.5" fill="#5c5247">Fisher's spiral; prices and</text>
  <text x="575" y="471" text-anchor="middle" font-size="12.5" fill="#5c5247">employment fall together</text>
  <text x="575" y="496" text-anchor="middle" font-size="11.5" font-style="italic" fill="#8a8073">the 1930s</text>

  <!-- 2025-26 marker in Stagflation -->
  <path d="M650,150 l8,8 l-8,8 l-8,-8 Z" fill="#8a3324"/>
  <text x="664" y="142" font-size="12" font-style="italic" fill="#8a3324">2025–26</text>
  <text x="664" y="158" font-size="12" font-style="italic" fill="#8a3324">configuration</text>

  <!-- right-half meaning carried by the shading and the caption -->

  <!-- Axis: vertical (Inflation) -->
  <line x1="110" y1="560" x2="110" y2="100" stroke="#6b6258" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="92" y="330" text-anchor="middle" font-size="14.5" letter-spacing="1.5" fill="#2b2622" transform="rotate(-90 92 330)">INFLATION</text>
  <text x="120" y="116" font-size="11.5" fill="#6b6258">high</text>
  <text x="120" y="552" font-size="11.5" fill="#6b6258">deflation</text>

  <!-- Axis: horizontal (Unemployment) -->
  <line x1="110" y1="560" x2="730" y2="560" stroke="#6b6258" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="420" y="592" text-anchor="middle" font-size="14.5" letter-spacing="1.5" fill="#2b2622">UNEMPLOYMENT</text>
  <text x="118" y="578" font-size="11.5" fill="#6b6258">low</text>
  <text x="712" y="578" font-size="11.5" fill="#6b6258">high</text>

  <!-- Caption -->
  <text x="420" y="638" text-anchor="middle" font-size="11.5" fill="#5c5247">Unemployment is the shared signature of the descent; its price sign is set by the monetary regime alone.</text>
  <text x="420" y="657" text-anchor="middle" font-size="11.5" font-style="italic" fill="#5c5247">The right-hand quadrants are one scarcinal event in two monetary regimes.</text>
</svg>
